name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Run unit tests
        run: make test TEST_CC=gcc

  output-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Build healthchecks with gcc
        run: |
          mkdir -p build
          for src in src/*.c; do
            name=$(basename "$src" .c)
            gcc -o "build/$name" "$src"
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install test dependencies
        working-directory: e2e
        run: npm ci

      - name: Run output format tests
        working-directory: e2e
        run: npm test

  valgrind:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Build healthchecks with gcc
        run: |
          mkdir -p build
          for src in src/*.c; do
            name=$(basename "$src" .c)
            gcc -o "build/$name" "$src"
          done

      - name: Valgrind disk_usage
        run: valgrind --leak-check=full --error-exitcode=1 ./build/disk_usage

      - name: Valgrind cpu_usage
        run: valgrind --leak-check=full --error-exitcode=1 ./build/cpu_usage
        env:
          HEALTHCHECK_ARG_SAMPLE_MS: '100'

      - name: Valgrind memory_usage
        run: valgrind --leak-check=full --error-exitcode=1 ./build/memory_usage

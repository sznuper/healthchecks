name: Build and Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shipurjan/setup-cosmopolitan@main
        with:
          version: '4.0.2'

      - name: Build checks
        run: make

      - uses: actions/upload-artifact@v4
        with:
          name: checks
          path: build/

  test:
    name: test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}
    needs: build
    strategy:
      matrix:
        include:
          - name: Ubuntu 24.04 x86_64
            runner: ubuntu-24.04
          - name: Ubuntu 22.04 x86_64
            runner: ubuntu-22.04
          - name: Ubuntu 24.04 aarch64
            runner: ubuntu-24.04-arm
          - name: Debian 13 x86_64
            runner: ubuntu-24.04
            container: debian:13
          - name: Fedora 43 x86_64
            runner: ubuntu-24.04
            container: fedora:43
          - name: Alpine 3.23 x86_64
            runner: ubuntu-24.04
            container: alpine:3.23
          - name: macOS 15 aarch64
            runner: macos-15
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: checks
          path: build/

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Test disk_usage defaults
        run: |
          output=$(sh ./build/disk_usage)
          echo "$output"
          echo "$output" | grep -q "^status=\(ok\|warning\|critical\)$"
          echo "$output" | grep -q "^mount=/$"
          echo "$output" | grep -q "^usage="
          echo "$output" | grep -q "^total="
          echo "$output" | grep -q "^used="
          echo "$output" | grep -q "^available="

      - name: Test disk_usage with custom thresholds
        run: |
          output=$(BARKER_ARG_THRESHOLD_WARN=0.01 BARKER_ARG_THRESHOLD_CRIT=0.02 BARKER_ARG_MOUNT=/ sh ./build/disk_usage)
          echo "$output"
          echo "$output" | grep -q "^status=critical$"

      - name: Test disk_usage exit code on invalid mount
        run: |
          if sh ./build/disk_usage 2>/dev/null; then
            echo "FAIL: expected non-zero exit for invalid mount"
            exit 1
          fi
        env:
          BARKER_ARG_MOUNT: /nonexistent/mount/point

  valgrind:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Build checks with gcc
        run: |
          mkdir -p build
          for src in checks/*.c; do
            name=$(basename "$src" .c)
            gcc -o "build/$name" "$src"
          done

      - name: Valgrind disk_usage
        run: valgrind --leak-check=full --error-exitcode=1 ./build/disk_usage

  benchmark:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: checks
          path: build/

      - name: Install hyperfine
        run: sudo apt-get update && sudo apt-get install -y hyperfine

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Benchmark checks
        run: |
          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Mean | Min | Max |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|-----|-----|" >> "$GITHUB_STEP_SUMMARY"
          for bin in build/*; do
            name=$(basename "$bin")
            hyperfine --warmup 3 --min-runs 50 --export-json "/tmp/${name}.json" "sh ./$bin"
            mean=$(jq -r '.results[0].mean * 1000 | floor' "/tmp/${name}.json")
            min=$(jq -r '.results[0].min * 1000 | floor' "/tmp/${name}.json")
            max=$(jq -r '.results[0].max * 1000 | floor' "/tmp/${name}.json")
            echo "| ${name} | ${mean}ms | ${min}ms | ${max}ms |" >> "$GITHUB_STEP_SUMMARY"
          done

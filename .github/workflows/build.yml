name: Build and Test

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub release after successful tests'
        type: boolean
        default: false
      bump:
        description: 'Version bump (only used if release=true)'
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor
      latest:
        description: 'Set as latest release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shipurjan/setup-cosmopolitan@1f92831f1e4197d9ed52449de0f9d1efc2bdf04e
        with:
          version: 'nightly'

      - name: Build healthchecks
        run: make

      - uses: actions/upload-artifact@v7
        with:
          name: checks
          path: build/

  vps-all:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86-64
            server_type: cx23
          - arch: aarch64
            server_type: cax11
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: checks
          path: build/

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run all healthchecks on VPS
        run: ./dev/test-on-vps.sh --skip-build
        env:
          SERVER_NAME: hc-e2e-all-${{ matrix.arch }}
          SERVER_TYPE: ${{ matrix.server_type }}
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY_NAME }}

      - name: Cleanup VPS (safety net)
        if: always()
        run: |
          SERVER_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.HETZNER_API_TOKEN }}" \
            "https://api.hetzner.cloud/v1/servers?name=$SERVER_NAME" | \
            jq -r '.servers[0].id // ""')
          if [[ -n "$SERVER_ID" ]]; then
            curl -s -o /dev/null -X DELETE \
              -H "Authorization: Bearer ${{ secrets.HETZNER_API_TOKEN }}" \
              "https://api.hetzner.cloud/v1/servers/$SERVER_ID"
            echo "Deleted leftover server $SERVER_ID ($SERVER_NAME)"
          fi
        env:
          SERVER_NAME: hc-e2e-all-${{ matrix.arch }}

  vps-ssh-journal:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86-64
            server_type: cx23
          - arch: aarch64
            server_type: cax11
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: checks
          path: build/

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run ssh_journal lifecycle test on VPS
        run: ./dev/test-ssh-journal.sh --skip-build
        env:
          SERVER_NAME: hc-e2e-ssh-journal-${{ matrix.arch }}
          SERVER_TYPE: ${{ matrix.server_type }}
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY_NAME }}

      - name: Cleanup VPS (safety net)
        if: always()
        run: |
          SERVER_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.HETZNER_API_TOKEN }}" \
            "https://api.hetzner.cloud/v1/servers?name=$SERVER_NAME" | \
            jq -r '.servers[0].id // ""')
          if [[ -n "$SERVER_ID" ]]; then
            curl -s -o /dev/null -X DELETE \
              -H "Authorization: Bearer ${{ secrets.HETZNER_API_TOKEN }}" \
              "https://api.hetzner.cloud/v1/servers/$SERVER_ID"
            echo "Deleted leftover server $SERVER_ID ($SERVER_NAME)"
          fi
        env:
          SERVER_NAME: hc-e2e-ssh-journal-${{ matrix.arch }}

  valgrind:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Build healthchecks with gcc
        run: |
          mkdir -p build
          for src in src/*.c; do
            name=$(basename "$src" .c)
            gcc -o "build/$name" "$src"
          done

      - name: Valgrind disk_usage
        run: valgrind --leak-check=full --error-exitcode=1 ./build/disk_usage

      - name: Valgrind cpu_usage
        run: valgrind --leak-check=full --error-exitcode=1 ./build/cpu_usage
        env:
          HEALTHCHECK_ARG_SAMPLE_MS: '100'

      - name: Valgrind memory_usage
        run: valgrind --leak-check=full --error-exitcode=1 ./build/memory_usage

  benchmark:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: checks
          path: build/

      - name: Install hyperfine
        run: sudo apt-get update && sudo apt-get install -y hyperfine

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Benchmark healthchecks
        run: |
          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Timing (hyperfine, 50 runs)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Mean | Min | Max |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|-----|-----|" >> "$GITHUB_STEP_SUMMARY"
          for bin in build/*; do
            name=$(basename "$bin")
            hyperfine --warmup 3 --min-runs 50 --export-json "/tmp/${name}.json" "sh ./$bin"
            mean=$(jq -r '.results[0].mean * 1000 | . * 100 | round / 100 | tostring + "ms"' "/tmp/${name}.json")
            min=$(jq -r '.results[0].min * 1000 | . * 100 | round / 100 | tostring + "ms"' "/tmp/${name}.json")
            max=$(jq -r '.results[0].max * 1000 | . * 100 | round / 100 | tostring + "ms"' "/tmp/${name}.json")
            echo "| ${name} | ${mean} | ${min} | ${max} |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Resources (single run)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Peak RSS | CPU User | CPU Sys | Page Faults |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|----------|----------|---------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          for bin in build/*; do
            name=$(basename "$bin")
            /usr/bin/time -f "%M %U %S %F %R" -o "/tmp/${name}.time" sh ./$bin > /dev/null
            read rss user sys major minor < "/tmp/${name}.time"
            echo "| ${name} | ${rss} KB | ${user}s | ${sys}s | ${major} major / ${minor} minor |" >> "$GITHUB_STEP_SUMMARY"
          done

  release:
    needs: [vps-all, vps-ssh-journal, valgrind, benchmark]
    if: inputs.release == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: checks
          path: build/

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "v0.0.0")
          latest="${latest#v}"
          IFS='.' read -r major minor patch <<< "$latest"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "tag=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            ${{ inputs.latest != true && '--prerelease' || '' }} \
            build/*

name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub release after successful tests'
        type: boolean
        default: false
      bump:
        description: 'Version bump (only used if release=true)'
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor
      latest:
        description: 'Set as latest release'
        type: boolean
        default: false

jobs:
  e2e:
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  benchmark:
    needs: e2e
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: checks
          path: build/

      - name: Install hyperfine
        run: sudo apt-get update && sudo apt-get install -y hyperfine

      - name: Make binaries executable
        run: chmod +x build/*

      - name: Benchmark healthchecks
        run: |
          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Timing (hyperfine, 50 runs)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Mean | Min | Max |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|-----|-----|" >> "$GITHUB_STEP_SUMMARY"
          for bin in build/*; do
            name=$(basename "$bin")
            hyperfine --warmup 3 --min-runs 50 --export-json "/tmp/${name}.json" "sh ./$bin"
            mean=$(jq -r '.results[0].mean * 1000 | . * 100 | round / 100 | tostring + "ms"' "/tmp/${name}.json")
            min=$(jq -r '.results[0].min * 1000 | . * 100 | round / 100 | tostring + "ms"' "/tmp/${name}.json")
            max=$(jq -r '.results[0].max * 1000 | . * 100 | round / 100 | tostring + "ms"' "/tmp/${name}.json")
            echo "| ${name} | ${mean} | ${min} | ${max} |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Resources (single run)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Peak RSS | CPU User | CPU Sys | Page Faults |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|----------|----------|---------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          for bin in build/*; do
            name=$(basename "$bin")
            /usr/bin/time -f "%M %U %S %F %R" -o "/tmp/${name}.time" sh ./$bin > /dev/null
            read rss user sys major minor < "/tmp/${name}.time"
            echo "| ${name} | ${rss} KB | ${user}s | ${sys}s | ${major} major / ${minor} minor |" >> "$GITHUB_STEP_SUMMARY"
          done

  release:
    needs: [e2e, benchmark]
    if: inputs.release == true
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: checks
          path: build/

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "v0.0.0")
          latest="${latest#v}"
          IFS='.' read -r major minor patch <<< "$latest"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "tag=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            ${{ inputs.latest != true && '--prerelease' || '' }} \
            build/*

  update-sznuper:
    needs: release
    if: inputs.release == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: checks
          path: build/

      - uses: actions/checkout@v6
        with:
          repository: sznuper/sznuper
          token: ${{ secrets.SZNUPER_PAT }}
          path: sznuper

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.45.4/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update healthcheck versions
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          cd sznuper/internal/initcmd/defaults
          for file in base.yml systemd.yml; do
            count=$(yq '.alerts | length' "$file")
            for i in $(seq 0 $((count - 1))); do
              hc=$(yq ".alerts[$i].healthcheck" "$file")
              if [[ "$hc" == *"healthchecks/releases/download/"* ]]; then
                binary=$(basename "$hc")
                sha=$(sha256sum "$GITHUB_WORKSPACE/build/$binary" | cut -d' ' -f1)
                yq -i "
                  .alerts[$i].healthcheck = \"https://github.com/sznuper/healthchecks/releases/download/$TAG/$binary\" |
                  .alerts[$i].sha256 = \"$sha\"
                " "$file"
              fi
            done
          done

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.SZNUPER_PAT }}
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          cd sznuper
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "healthchecks-$TAG"
          git add internal/initcmd/defaults/
          git commit -m "build: bump healthchecks to $TAG"
          git push -u origin "healthchecks-$TAG"

          BODY="## Updated binaries\n\n| Binary | SHA256 |\n|--------|--------|\n"
          for bin in "$GITHUB_WORKSPACE"/build/*; do
            name=$(basename "$bin")
            sha=$(sha256sum "$bin" | cut -d' ' -f1)
            BODY+="| $name | \`$sha\` |\n"
          done

          gh pr create \
            --title "build: bump healthchecks to $TAG" \
            --body "$(echo -e "$BODY")"
